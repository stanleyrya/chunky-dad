  <style>
    :root {
      color-scheme: dark;
      --page-bg: #0b0d13;
      --panel-bg: #141826;
      --text-primary: #f6f7ff;
      --text-secondary: #c4c8e4;
      --accent: #ffa24a;
      --border: rgba(255, 255, 255, 0.08);
      --sticky-header-offset: 4rem;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--page-bg);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page-wrapper {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: calc(var(--sticky-header-offset) + 2rem) 1.25rem 3.2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .tool-header {
      background: rgba(11, 13, 19, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
    }

    .tool-nav {
      display: flex;
      align-items: center;
      padding: 0.7rem 1rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .tool-nav .logo a {
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tool-nav .logo h1 {
      margin: 0;
      font-size: 1.45rem;
      color: var(--text-primary);
    }

    .logo-img {
      height: 36px;
      width: auto;
    }

    .landscapes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 2rem;
      align-items: center;
      justify-items: center;
    }

    .landscape-card {
      background: var(--panel-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      transition: transform 0.2s ease;
    }

    .landscape-card:hover {
      transform: translateY(-5px);
    }

    .landscape-card h2 {
      margin: 0;
      font-size: 1.2rem;
      color: var(--text-primary);
      text-align: center;
    }

    /* Original Codepen SCSS Converted to standard CSS */
    .container {
      position: relative;
      width: 160px;
      height: 335px;
      background: #FAE0C8;
      border-radius: 100px;
      overflow: hidden;
      transform: scale(0.9);
      transform-origin: center;
    }

    .mountain {
      position: absolute;
      top: 0;
      opacity: 1;
    }

    /* Birds Front */
    .birds {
      position: absolute;
    }
    .birds.front {
      /* positioning for birds */
    }

    /* Simple placeholder styles based on the SCSS vars */
    .container .range {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 120px;
      background: #F46435;
      z-index: 3;
    }

    .container .mountain {
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .container .mountain::after {
      content: '';
      position: absolute;
      bottom: 20px;
      left: -20px;
      width: 200px;
      height: 200px;
      background: #F59452; /* mountain1 */
      border-radius: 40%;
      transform: rotate(45deg);
    }

    .container .mountain::before {
      content: '';
      position: absolute;
      bottom: -40px;
      left: 60px;
      width: 150px;
      height: 150px;
      background: #F47A45; /* mountain2 */
      border-radius: 30%;
      transform: rotate(45deg);
      z-index: 2;
    }

    .container .tree {
      position: absolute;
      z-index: 4;
    }

    .container .tree .top {
      position: absolute;
      bottom: 0;
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-bottom: 35px solid #2D1427; /* tree1 */
    }

    .container .tree .mid {
      position: absolute;
      bottom: 15px;
      left: -2px;
      width: 0;
      height: 0;
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-bottom: 40px solid #2D1427;
    }

    .container .tree1 { left: 10px; bottom: 30px; transform: scale(1.1); }
    .container .tree2 { left: 35px; bottom: 40px; transform: scale(1.3); }
    .container .tree3 { left: 110px; bottom: 35px; transform: scale(0.9); }

    .container .tree2 .top, .container .tree2 .mid { border-bottom-color: #5A0831; }
    .container .tree3 .top, .container .tree3 .mid { border-bottom-color: #CD4D45; }

    /* Tower */
    .container .tower {
      position: absolute;
      bottom: 40px;
      left: 65px;
      width: 30px;
      height: 80px;
      background: #76122C; /* tower1 */
      z-index: 5;
    }

    .container .tower .roof1 {
      position: absolute;
      top: -25px;
      left: -5px;
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-bottom: 25px solid #C93D3D; /* tower2 */
    }
  </style>
</head>
