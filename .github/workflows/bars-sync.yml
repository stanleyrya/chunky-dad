name: Sync Bars Data

on:
  schedule:
    # Run every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allow manual trigger
  push:
    paths:
      - 'tools/sync-bars.js'
      - '.github/workflows/bars-sync.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync-bars:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # Note: GitHub App installation tokens will soon use a new stateless format (ghs_...)
        # and may be longer (~520 characters). Avoid adding hardcoded length assumptions.
        token: ${{ secrets.GITHUB_TOKEN }}
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
      
    - name: Create bars data directory
      run: mkdir -p data/bars
      
    - name: Sync bars data
      id: sync_bars
      run: |
        # Keep workflow running so we can commit failure notes before failing at the end.
        set +e
        node tools/sync-bars.js
        SYNC_EXIT_CODE=$?
        echo "sync_exit_code=$SYNC_EXIT_CODE" >> "$GITHUB_OUTPUT"
        exit 0
      
    - name: Commit updated bars data
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Bars Sync Bot"
        
        # Add all bars data files
        git add data/bars/
        
        # Check if there are changes to commit
        if git diff --staged --quiet; then
          echo "No bars data changes to commit"
        else
          # Count the number of changed files
          CHANGED_FILES=$(git diff --staged --name-only | wc -l)
          CHANGED_BAR_FILES=$(git diff --staged --name-only | grep '\.json$' | wc -l)
          
          git commit -m "🍺 Sync bars data from Google Sheets - $(date -u '+%Y-%m-%d %H:%M UTC') (${CHANGED_BAR_FILES} files changed)"
          git push
          echo "✓ Bars data synced and committed (${CHANGED_FILES} files changed)"
        fi

    - name: Fail workflow if extraction failed
      if: steps.sync_bars.outputs.sync_exit_code != '0'
      run: |
        echo "❌ External extraction failed during bars sync. Check sync logs and failure notes in updated bars data."
        exit 1
